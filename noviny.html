<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Novinky | Školka Včielka</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Quicksand:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#D9EFFF;color:#1a1a1a;}
a{text-decoration:none;color:inherit;}
img{max-width:100%;display:block;}
.nav{background:#F9C832;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:10px;}
.nav-logo img{height:50px;width:auto;object-fit:contain;}
.nav-logo-text{font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;color:#1a1a1a;}
.nav-logo-sub{font-size:9px;color:#1A5FA8;display:block;}
.nav-back{display:flex;align-items:center;gap:8px;font-family:'Quicksand',sans-serif;font-size:13px;font-weight:700;color:#1A5FA8;background:#fff;padding:8px 18px;border-radius:50px;}
.page-hero{background:#1A5FA8;padding:56px 32px 48px;text-align:center;}
.page-hero h1{font-family:'Nunito',sans-serif;font-size:clamp(28px,5vw,44px);font-weight:800;color:#fff;margin-bottom:12px;}
.page-hero p{font-size:15px;color:rgba(255,255,255,.75);}
.wave{line-height:0;display:block;margin-bottom:-1px;}
.content{max-width:1100px;margin:0 auto;padding:48px 32px;}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;}
.news-card{border-radius:24px;overflow:hidden;cursor:pointer;transition:transform .25s;display:flex;flex-direction:column;}
.news-card:hover{transform:translateY(-4px);}
.news-card.blue{background:#EEF7FF;}
.news-card.yellow{background:#FFF8DC;}
.news-card.green{background:#E2F5EC;}
.news-img{height:200px;display:flex;align-items:center;justify-content:center;font-size:40px;overflow:hidden;flex-shrink:0;}
.news-card.blue .news-img{background:#C8E6FA;}
.news-card.yellow .news-img{background:#FFE87A;}
.news-card.green .news-img{background:#B2E8C8;}
.news-img img{width:100%;height:100%;object-fit:cover;}
.news-body{padding:20px 22px 24px;flex:1;display:flex;flex-direction:column;}
.news-date{font-size:11px;color:#aaa;margin-bottom:8px;}
.news-title{font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:10px;line-height:1.3;}
.news-excerpt{font-size:13px;color:#666;line-height:1.6;flex:1;}
.news-cta{display:inline-block;margin-top:16px;font-family:'Quicksand',sans-serif;font-size:13px;font-weight:700;color:#1A5FA8;background:#D9EFFF;padding:8px 18px;border-radius:50px;}
.news-card.yellow .news-cta{color:#A07800;background:#FFF9E0;}
.news-card.green .news-cta{color:#1A6640;background:#E2F5EC;}
.empty{text-align:center;padding:80px 32px;color:#aaa;}
.empty p{font-family:'Quicksand',sans-serif;font-size:18px;margin-top:16px;}
.loading{text-align:center;padding:80px;color:#5590C4;font-family:'Quicksand',sans-serif;font-size:16px;}
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.popup-overlay.open{display:flex;}
.popup{background:#fff;border-radius:28px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:popIn .3s ease;}
@keyframes popIn{from{transform:scale(.94) translateY(20px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.popup-photo{height:260px;overflow:hidden;border-radius:28px 28px 0 0;background:#C8E6FA;display:flex;align-items:center;justify-content:center;font-size:48px;flex-shrink:0;}
.popup-photo img{width:100%;height:100%;object-fit:cover;}
.popup-close{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.4);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
.popup-body{padding:28px 32px 36px;}
.popup-date{font-size:12px;color:#aaa;margin-bottom:8px;}
.popup-title{font-family:'Nunito',sans-serif;font-size:24px;font-weight:800;color:#1a1a1a;margin-bottom:16px;line-height:1.3;}
.popup-content{font-size:15px;color:#444;line-height:1.8;}
.page-footer{background:#0D3D6E;padding:24px 32px;text-align:center;margin-top:60px;}
.page-footer p{font-size:12px;color:rgba(255,255,255,.4);margin-top:8px;}
.page-footer a{color:rgba(255,255,255,.6);font-family:'Quicksand',sans-serif;font-size:13px;font-weight:600;}
@media(max-width:600px){.content{padding:32px 16px;}.news-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo">
    <img src="VCIELKA_LOGO.png" alt="Včielka" onerror="this.style.display='none'"/>
    <div><div class="nav-logo-text">Školka Včielka</div><span class="nav-logo-sub">súkromná materská škola</span></div>
  </a>
  <a href="index.html" class="nav-back">← Späť na hlavnú</a>
</nav>
<div class="page-hero">
  <h1>📰 Novinky v škôlke</h1>
  <p>Všetky správy, akcie a aktuality zo Školky Včielka</p>
</div>
<svg class="wave" viewBox="0 0 1440 60" preserveAspectRatio="none" style="background:#1A5FA8;" xmlns="http://www.w3.org/2000/svg">
  <path d="M0,60 L0,30 Q360,0 720,30 Q1080,60 1440,30 L1440,60 Z" fill="#D9EFFF"/>
</svg>
<div class="content"><div id="newsList" class="loading">Načítavam novinky...</div></div>
<div class="popup-overlay" id="popupOverlay" onclick="if(event.target===this)closePopup()">
  <div class="popup" id="popup">
    <button class="popup-close" onclick="closePopup()">✕</button>
    <div class="popup-photo" id="popupPhoto"></div>
    <div class="popup-body">
      <div class="popup-date" id="popupDate"></div>
      <div class="popup-title" id="popupTitle"></div>
      <div class="popup-content" id="popupContent"></div>
    </div>
  </div>
</div>
<footer class="page-footer">
  <a href="index.html">← Späť na hlavnú stránku</a>
  <p>© 2025 Školka Včielka · Bratislava, Ružinov</p>
</footer>
<script>
const SUPA_URL='https://fmjtzuligqsugsauqkgz.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtanR6dWxpZ3FzdWdzYXVxa2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTQyMTUsImV4cCI6MjA5MDk5MDIxNX0.gRF-roExLgnVDG4bSNt7EzX6c1v-JtM5v6ZcX8dY934';
let db,allNews=[];
try{const{createClient}=supabase;db=createClient(SUPA_URL,SUPA_KEY);}catch(e){}

async function loadNews(){
  const list=document.getElementById('newsList');
  try{
    const{data,error}=await db.from('news').select('*').order('created_at',{ascending:false});
    if(error)throw error;
    allNews=data||[];
    if(!allNews.length){list.innerHTML='<div class="empty">📰<p>Zatiaľ žiadne novinky.</p></div>';return;}
    list.className='news-grid';
    list.innerHTML=allNews.map((n,i)=>`
      <div class="news-card ${n.color||'blue'}" onclick="openPopup(${i})">
        <div class="news-img">${n.photo_url?'<img src="'+n.photo_url+'" alt="'+n.title+'"/>':'📸'}</div>
        <div class="news-body">
          <div class="news-date">${new Date(n.published_at||n.created_at).toLocaleDateString('sk-SK',{day:'numeric',month:'long',year:'numeric'})}</div>
          <div class="news-title">${n.title}</div>
          <div class="news-excerpt">${n.excerpt||''}</div>
          <span class="news-cta">Čítať viac →</span>
        </div>
      </div>`).join('');
  }catch(e){list.innerHTML='<div class="empty">📰<p>Novinky sa nepodarilo načítať.</p></div>';}
}

function openPopup(idx){
  const n=allNews[idx];if(!n)return;
  const colors={blue:'#C8E6FA',yellow:'#FFE87A',green:'#B2E8C8'};
  const ph=document.getElementById('popupPhoto');
  if(n.photo_url){ph.innerHTML='<img src="'+n.photo_url+'" alt="'+n.title+'"/>';}
  else{ph.style.background=colors[n.color]||'#C8E6FA';ph.innerHTML='📰';}
  document.getElementById('popupDate').textContent=new Date(n.published_at||n.created_at).toLocaleDateString('sk-SK',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('popupTitle').textContent=n.title;
  document.getElementById('popupContent').innerHTML=(n.content||n.excerpt||'').replace(/\n/g,'<br>');
  document.getElementById('popupOverlay').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('popup').scrollTop=0;
}

function closePopup(){
  document.getElementById('popupOverlay').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup();});

const urlParams=new URLSearchParams(window.location.search);
const newsId=urlParams.get('id');
loadNews().then(()=>{if(newsId){const idx=allNews.findIndex(n=>n.id==newsId);if(idx>=0)openPopup(idx);}});
</script>
</body>
</html>
